<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CV4ME — Resume Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
  *{box-sizing:border-box;}
  body{ margin:0; background:#F0EEE9; font-family:'Inter',system-ui,sans-serif; color:#1B2430; }
  .ui-font{ font-family:'Inter',system-ui,sans-serif; }
  .paper-font{ font-family:'Source Serif 4', Georgia, serif; }
  input,textarea{ font-family:inherit; }
  #load-fallback{ min-height:100vh; display:flex; align-items:center; justify-content:center; color:#78716c; font-size:14px; }
  .editor-grid{ max-width:1120px; margin:0 auto; display:grid; grid-template-columns:1fr 1.15fr; gap:32px; padding:28px 24px; }
  .preview-col{ position:sticky; top:80px; align-self:flex-start; }
  .btn-primary{ transition:transform .15s ease, box-shadow .15s ease, opacity .15s ease; }
  .btn-primary:hover:not(:disabled){ transform:translateY(-1px); box-shadow:0 6px 16px rgba(0,0,0,0.18); }
  .btn-primary:active:not(:disabled){ transform:translateY(0); }
  .btn-secondary{ transition:background .15s ease, border-color .15s ease; }
  .btn-secondary:hover{ background:#f5f4f1; border-color:#a8a29e; }
  .field-input{ transition:border-color .15s ease, box-shadow .15s ease; }
  .field-input:focus{ outline:none; border-color:#B4833C !important; box-shadow:0 0 0 3px rgba(180,131,60,0.12); }
  @media (max-width:860px){
    .editor-grid{ grid-template-columns:1fr; padding:16px; gap:20px; }
    .preview-col{ position:static; }
    #paper{ padding:32px 24px !important; }
  }
  @media (max-width:420px){
    .field-grid-2{ grid-template-columns:1fr !important; }
  }
  @media print {
    body * { visibility:hidden; }
    #paper, #paper * { visibility:visible; }
    #paper{ position:absolute; top:0; left:0; width:100%; box-shadow:none !important; margin:0 !important; }
    #no-print{ display:none !important; }
  }
</style>
</head>
<body>
<div id="root"><div id="load-fallback">Loading…</div></div>
<script>
  setTimeout(function(){
    if (typeof React === "undefined") {
      document.getElementById("root").innerHTML =
        '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;padding:24px;text-align:center;font-family:sans-serif;color:#78716c;">' +
        '<div style="font-weight:600;color:#1B2430;">Couldn\'t load the app</div>' +
        '<div style="font-size:13px;max-width:320px;">A required script failed to load. Try switching from wifi to mobile data (or the reverse), or check if a VPN/ad blocker is active.</div>' +
        '</div>';
    }
  }, 6000);
</script>

<script>
const { useState, useEffect } = React;
const h = React.createElement;
const uid = () => Math.random().toString(36).slice(2, 9);

const emptyExp = () => ({ id: uid(), role: "", company: "", start: "", end: "", bullets: [""] });
const emptyEdu = () => ({ id: uid(), school: "", degree: "", start: "", end: "" });

const initialState = {
  name: "", title: "", email: "", phone: "", location: "", link: "",
  summary: "", experience: [emptyExp()], education: [emptyEdu()], skills: "",
};

function Field({ label, ...props }) {
  return h("label", { style:{display:"block"} },
    h("span", { style:{display:"block",fontSize:11,fontWeight:600,letterSpacing:"0.03em",color:"#78716c",textTransform:"uppercase",marginBottom:4} }, label),
    h("input", Object.assign({ className:"field-input" }, props, { style:{width:"100%",borderRadius:6,border:"1px solid #d6d3ce",background:"#fff",padding:"8px 10px",fontSize:14,color:"#292524"} }))
  );
}

function TextArea({ label, ...props }) {
  return h("label", { style:{display:"block"} },
    h("span", { style:{display:"block",fontSize:11,fontWeight:600,letterSpacing:"0.03em",color:"#78716c",textTransform:"uppercase",marginBottom:4} }, label),
    h("textarea", Object.assign({ className:"field-input" }, props, { style:{width:"100%",borderRadius:6,border:"1px solid #d6d3ce",background:"#fff",padding:"8px 10px",fontSize:14,color:"#292524",resize:"none"} }))
  );
}

function SectionLabel({ n, children }) {
  return h("div", { style:{display:"flex",alignItems:"center",gap:8,margin:"28px 0 12px"} },
    h("span", { style:{fontSize:11,fontFamily:"'JetBrains Mono',monospace",color:"rgba(180,131,60,0.8)"} }, n),
    h("h2", { style:{fontSize:12,fontWeight:600,letterSpacing:"0.14em",textTransform:"uppercase",color:"#57534e",margin:0} }, children),
    h("div", { style:{height:1,flex:1,background:"#e7e5e0"} })
  );
}

function Paywall({ onStart, loading }) {
  return h("div", { style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16,padding:24,textAlign:"center"} },
    h("div", { style:{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"#B4833C",letterSpacing:"0.1em",textTransform:"uppercase"} },
      "R/01 · ",
      h("span", { style:{fontWeight:800,color:"#191F29"} }, "CV", h("span", { style:{color:"#B4833C"} }, "4"), "ME")
    ),
    h("h1", { className:"paper-font", style:{fontSize:32,fontWeight:600,margin:0} }, "Start a new resume"),
    h("p", { style:{color:"#78716c",maxWidth:360,fontSize:14,margin:0} }, "Each resume is $1.99, paid once at the start. You'll get the live editor and unlimited edits and PDF exports for this resume."),
    h("button", { className:"btn-primary", onClick:onStart, disabled:loading, style:{marginTop:8,background:"#1c1917",color:"#fafaf9",border:"none",padding:"12px 22px",borderRadius:6,fontSize:14,fontWeight:600,cursor:loading?"default":"pointer",opacity:loading?0.6:1} },
      loading ? "Redirecting to checkout…" : "Start new resume — $1.99"
    )
  );
}

function App() {
  const [data, setData] = useState(initialState);
  const [paid, setPaid] = useState(false);
  const [checking, setChecking] = useState(true);
  const [verifyError, setVerifyError] = useState(false);
  const [startingCheckout, setStartingCheckout] = useState(false);

  const restoreSavedData = () => {
    try {
      const saved = localStorage.getItem("cv4me_data");
      if (saved) setData(JSON.parse(saved));
    } catch (e) {}
  };

  const verifySession = (sid) => {
    setChecking(true);
    setVerifyError(false);
    fetch(`/api/verify-session?session_id=${encodeURIComponent(sid)}`)
      .then((r) => r.json())
      .then((d) => {
        if (d.paid) {
          try { localStorage.setItem("cv4me_paid_sid", sid); } catch (e) {}
          restoreSavedData();
          setPaid(true);
        } else {
          setPaid(false);
        }
        setChecking(false);
      })
      .catch(() => {
        let previouslyPaid = false;
        try { previouslyPaid = localStorage.getItem("cv4me_paid_sid") === sid; } catch (e) {}
        if (previouslyPaid) {
          restoreSavedData();
          setPaid(true);
          setChecking(false);
        } else {
          setVerifyError(true);
          setChecking(false);
        }
      });
  };

  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const sid = params.get("session_id");
    if (sid) {
      verifySession(sid);
    } else {
      let existingSid = null;
      try { existingSid = localStorage.getItem("cv4me_paid_sid"); } catch (e) {}
      if (existingSid) {
        restoreSavedData();
        setPaid(true);
      }
      setChecking(false);
    }
  }, []);

  useEffect(() => {
    if (!paid) return;
    try { localStorage.setItem("cv4me_data", JSON.stringify(data)); } catch (e) {}
  }, [data, paid]);

  const startCheckout = async () => {
    setStartingCheckout(true);
    try {
      const res = await fetch("/api/create-checkout-session", { method: "POST" });
      const d = await res.json();
      if (d.url) { window.location.href = d.url; return; }
    } catch (e) {}
    setStartingCheckout(false);
  };

  const set = (k, v) => setData((d) => ({ ...d, [k]: v }));
  const updateExp = (id, patch) => setData((d) => ({ ...d, experience: d.experience.map((e) => (e.id === id ? { ...e, ...patch } : e)) }));
  const updateBullet = (expId, i, val) => setData((d) => ({ ...d, experience: d.experience.map((e) => e.id === expId ? { ...e, bullets: e.bullets.map((b, bi) => (bi === i ? val : b)) } : e) }));
  const addBullet = (expId) => setData((d) => ({ ...d, experience: d.experience.map((e) => e.id === expId ? { ...e, bullets: [...e.bullets, ""] } : e) }));
  const removeBullet = (expId, i) => setData((d) => ({ ...d, experience: d.experience.map((e) => e.id === expId ? { ...e, bullets: e.bullets.filter((_, bi) => bi !== i) } : e) }));
  const addExp = () => setData((d) => ({ ...d, experience: [...d.experience, emptyExp()] }));
  const removeExp = (id) => setData((d) => ({ ...d, experience: d.experience.filter((e) => e.id !== id) }));
  const updateEdu = (id, patch) => setData((d) => ({ ...d, education: d.education.map((e) => (e.id === id ? { ...e, ...patch } : e)) }));
  const addEdu = () => setData((d) => ({ ...d, education: [...d.education, emptyEdu()] }));
  const removeEdu = (id) => setData((d) => ({ ...d, education: d.education.filter((e) => e.id !== id) }));
  const handlePrint = () => window.print();
  const skillList = data.skills.split(",").map((s) => s.trim()).filter(Boolean);

  const startNewResume = () => {
    if (!window.confirm("Start a new resume? Your current one will be cleared, and a new resume is another $1.99.")) return;
    try {
      localStorage.removeItem("cv4me_paid_sid");
      localStorage.removeItem("cv4me_data");
    } catch (e) {}
    window.history.replaceState({}, "", window.location.pathname);
    setData(initialState);
    setPaid(false);
  };

  if (checking) {
    return h("div", { style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:"#78716c",fontSize:14} }, "Checking payment…");
  }
  if (verifyError) {
    return h("div", { style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:14,padding:24,textAlign:"center"} },
      h("div", { style:{fontWeight:600,fontSize:16} }, "Couldn't confirm your payment"),
      h("p", { style:{color:"#78716c",fontSize:13,maxWidth:320,margin:0} }, "This is usually a brief connection hiccup. If you already paid, don't pay again — just retry."),
      h("button", {
        className:"btn-primary",
        onClick: () => {
          const sid = new URLSearchParams(window.location.search).get("session_id");
          if (sid) verifySession(sid);
        },
        style:{background:"#1c1917",color:"#fafaf9",border:"none",padding:"11px 20px",borderRadius:6,fontSize:14,fontWeight:600,cursor:"pointer"}
      }, "Retry")
    );
  }
  if (!paid) {
    return h(Paywall, { onStart: startCheckout, loading: startingCheckout });
  }

  return h("div", null,
    h("div", { id:"no-print", style:{borderBottom:"1px solid #e7e5e0",background:"rgba(250,249,247,0.9)",position:"sticky",top:0,zIndex:10} },
      h("div", { style:{maxWidth:1120,margin:"0 auto",padding:"12px 24px",display:"flex",justifyContent:"space-between",alignItems:"center"} },
        h("div", { style:{fontWeight:800,fontSize:15,letterSpacing:"-0.02em"} },
          h("span", { style:{fontFamily:"'JetBrains Mono',monospace",color:"#B4833C",fontSize:11,marginRight:8,fontWeight:500} }, "R/01"),
          "CV", h("span", { style:{color:"#B4833C"} }, "4"), "ME"
        ),
        h("div", { style:{display:"flex",alignItems:"center"} },
          h("button", { className:"btn-primary", onClick:handlePrint, style:{background:"#1c1917",color:"#fafaf9",border:"none",padding:"9px 16px",borderRadius:6,fontSize:13,fontWeight:600,cursor:"pointer"} }, "Print / Save as PDF"),
          h("button", { className:"btn-secondary", onClick:startNewResume, style:{background:"transparent",color:"#78716c",border:"1px solid #d6d3ce",padding:"8px 14px",borderRadius:6,fontSize:13,fontWeight:600,cursor:"pointer",marginLeft:8} }, "New resume")
        )
      )
    ),
    h("div", { className:"editor-grid" },
      h("div", { id:"no-print" },
        h(SectionLabel, { n:"01" }, "Identity"),
        h("div", { className:"field-grid-2", style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10} },
          h(Field, { label:"Full name", value:data.name, onChange:(e)=>set("name",e.target.value) }),
          h(Field, { label:"Title", value:data.title, onChange:(e)=>set("title",e.target.value) }),
          h(Field, { label:"Email", value:data.email, onChange:(e)=>set("email",e.target.value) }),
          h(Field, { label:"Phone", value:data.phone, onChange:(e)=>set("phone",e.target.value) }),
          h(Field, { label:"Location", value:data.location, onChange:(e)=>set("location",e.target.value) }),
          h(Field, { label:"Link", value:data.link, onChange:(e)=>set("link",e.target.value) })
        ),
        h(SectionLabel, { n:"02" }, "Summary"),
        h(TextArea, { rows:3, value:data.summary, onChange:(e)=>set("summary",e.target.value), label:"Two or three sentences" }),
        h(SectionLabel, { n:"03" }, "Experience"),
        data.experience.map((exp) =>
          h("div", { key:exp.id, style:{border:"1px solid #e7e5e0",borderRadius:8,background:"#fff",padding:14,marginBottom:14} },
            h("div", { style:{display:"flex",gap:8} },
              h("div", { className:"field-grid-2", style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,flex:1} },
                h(Field, { label:"Role", value:exp.role, onChange:(e)=>updateExp(exp.id,{role:e.target.value}) }),
                h(Field, { label:"Company", value:exp.company, onChange:(e)=>updateExp(exp.id,{company:e.target.value}) }),
                h(Field, { label:"Start", value:exp.start, onChange:(e)=>updateExp(exp.id,{start:e.target.value}) }),
                h(Field, { label:"End", value:exp.end, onChange:(e)=>updateExp(exp.id,{end:e.target.value}) })
              ),
              h("button", { onClick:()=>removeExp(exp.id), style:{background:"none",border:"none",color:"#a8a29e",cursor:"pointer",alignSelf:"flex-start",marginTop:20} }, "✕")
            ),
            h("div", { style:{marginTop:10,display:"flex",flexDirection:"column",gap:6} },
              exp.bullets.map((b,i) =>
                h("div", { key:i, style:{display:"flex",gap:6,alignItems:"center"} },
                  h("input", { value:b, placeholder:"What did you do, and what changed?", onChange:(e)=>updateBullet(exp.id,i,e.target.value), style:{flex:1,border:"1px solid #e7e5e0",background:"#fafaf9",borderRadius:6,padding:"6px 8px",fontSize:13} }),
                  h("button", { onClick:()=>removeBullet(exp.id,i), style:{background:"none",border:"none",color:"#d6d3ce",cursor:"pointer"} }, "✕")
                )
              ),
              h("button", { onClick:()=>addBullet(exp.id), style:{background:"none",border:"none",color:"#B4833C",fontSize:12,fontWeight:600,cursor:"pointer",textAlign:"left",padding:0} }, "+ Add line")
            )
          )
        ),
        h("button", { onClick:addExp, style:{background:"none",border:"none",color:"#44403c",fontSize:13,fontWeight:600,cursor:"pointer",padding:0} }, "+ Add position"),
        h(SectionLabel, { n:"04" }, "Education"),
        data.education.map((edu) =>
          h("div", { key:edu.id, style:{border:"1px solid #e7e5e0",borderRadius:8,background:"#fff",padding:14,marginBottom:10,display:"flex",gap:8} },
            h("div", { className:"field-grid-2", style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,flex:1} },
              h(Field, { label:"School", value:edu.school, onChange:(e)=>updateEdu(edu.id,{school:e.target.value}) }),
              h(Field, { label:"Degree", value:edu.degree, onChange:(e)=>updateEdu(edu.id,{degree:e.target.value}) }),
              h(Field, { label:"Start", value:edu.start, onChange:(e)=>updateEdu(edu.id,{start:e.target.value}) }),
              h(Field, { label:"End", value:edu.end, onChange:(e)=>updateEdu(edu.id,{end:e.target.value}) })
            ),
            h("button", { onClick:()=>removeEdu(edu.id), style:{background:"none",border:"none",color:"#a8a29e",cursor:"pointer",alignSelf:"flex-start",marginTop:20} }, "✕")
          )
        ),
        h("button", { onClick:addEdu, style:{background:"none",border:"none",color:"#44403c",fontSize:13,fontWeight:600,cursor:"pointer",padding:0} }, "+ Add school"),
        h(SectionLabel, { n:"05" }, "Skills"),
        h(TextArea, { rows:2, value:data.skills, onChange:(e)=>set("skills",e.target.value), label:"Comma separated" }),
        h("div", { style:{height:24} })
      ),
      h("div", { className:"preview-col" },
        h("div", { id:"paper", className:"paper-font", style:{background:"#fff",boxShadow:"0 2px 20px rgba(0,0,0,0.09)",maxWidth:680,minHeight:880,padding:"56px 52px",margin:"0 auto"} },
          h("div", { style:{display:"flex",justifyContent:"space-between",alignItems:"baseline",borderBottom:"2px solid #1c1917",paddingBottom:12,marginBottom:16} },
            h("div", null,
              h("div", { style:{fontSize:28,fontWeight:600,letterSpacing:"-0.01em",lineHeight:1} }, data.name || "Your Name"),
              h("div", { style:{fontSize:14,color:"#B4833C",marginTop:4} }, data.title)
            )
          ),
          h("div", { className:"ui-font", style:{fontSize:11,color:"#78716c",display:"flex",flexWrap:"wrap",gap:"2px 12px",marginBottom:20} },
            [data.email,data.phone,data.location,data.link].filter(Boolean).map((v,i) => h("span", { key:i }, v))
          ),
          data.summary ? h("p", { style:{fontSize:13,lineHeight:1.6,color:"#44403c",marginBottom:20} }, data.summary) : null,
          data.experience.some(e=>e.role||e.company) ? h("div", { style:{marginBottom:20} },
            h("div", { className:"ui-font", style:{fontSize:10,fontWeight:600,letterSpacing:"0.14em",textTransform:"uppercase",color:"#a8a29e",borderBottom:"1px solid #e7e5e0",paddingBottom:4,marginBottom:10} }, "Experience"),
            data.experience.map((exp) =>
              h("div", { key:exp.id, style:{marginBottom:14} },
                h("div", { style:{display:"flex",justifyContent:"space-between",alignItems:"baseline"} },
                  h("div", { style:{fontSize:14,fontWeight:600} }, exp.role, " ", exp.company ? h("span", { style:{fontWeight:400,color:"#57534e"} }, "— ", exp.company) : null),
                  h("div", { className:"ui-font", style:{fontSize:10.5,color:"#a8a29e",marginLeft:8} }, exp.start, exp.end ? ` – ${exp.end}` : "")
                ),
                h("ul", { style:{marginTop:4,paddingLeft:0,listStyle:"none"} },
                  exp.bullets.filter(Boolean).map((b,i) =>
                    h("li", { key:i, style:{fontSize:12.5,color:"#44403c",paddingLeft:14,position:"relative",marginBottom:2} },
                      h("span", { style:{position:"absolute",left:0,color:"#B4833C"} }, "—"),
                      b
                    )
                  )
                )
              )
            )
          ) : null,
          data.education.some(e=>e.school) ? h("div", { style:{marginBottom:20} },
            h("div", { className:"ui-font", style:{fontSize:10,fontWeight:600,letterSpacing:"0.14em",textTransform:"uppercase",color:"#a8a29e",borderBottom:"1px solid #e7e5e0",paddingBottom:4,marginBottom:10} }, "Education"),
            data.education.map((edu) =>
              h("div", { key:edu.id, style:{display:"flex",justifyContent:"space-between",marginBottom:6} },
                h("div", { style:{fontSize:13} }, edu.school, edu.degree ? h("span", { style:{color:"#78716c"} }, " — ", edu.degree) : null),
                h("div", { className:"ui-font", style:{fontSize:10.5,color:"#a8a29e"} }, edu.start, edu.end ? ` – ${edu.end}` : "")
              )
            )
          ) : null,
          skillList.length>0 ? h("div", null,
            h("div", { className:"ui-font", style:{fontSize:10,fontWeight:600,letterSpacing:"0.14em",textTransform:"uppercase",color:"#a8a29e",borderBottom:"1px solid #e7e5e0",paddingBottom:4,marginBottom:10} }, "Skills"),
            h("div", { style:{display:"flex",flexWrap:"wrap",gap:6} },
              skillList.map((s,i) => h("span", { key:i, className:"ui-font", style:{fontSize:11,background:"#f5f4f1",borderRadius:4,padding:"3px 8px"} }, s))
            )
          ) : null
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
