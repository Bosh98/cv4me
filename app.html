<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CV4ME — Resume Builder</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="canonical" href="https://www.cv4me.io/app.html" />
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
  :root{
    --ink:#0C0D10; --ink-card:#1B1E24; --ink-input:#22252B;
    --paper:#F4F2EC; --amber:#F2A93A; --amber-dim:#B87F1E; --slate:#A29B8C;
    --line:rgba(244,242,236,0.12);
  }
  *{box-sizing:border-box;}
  body{ margin:0; background:var(--ink); font-family:'Plus Jakarta Sans',system-ui,sans-serif; color:var(--paper); }
  .ui-font{ font-family:'Plus Jakarta Sans',system-ui,sans-serif; }
  .paper-font{ font-family:'Source Serif 4', Georgia, serif; }
  input,textarea{ font-family:inherit; }
  #load-fallback{ min-height:100vh; display:flex; align-items:center; justify-content:center; color:var(--slate); font-size:14px; }
  .editor-grid{ max-width:1120px; margin:0 auto; display:grid; grid-template-columns:1fr 1.15fr; gap:32px; padding:28px 24px; }
  .preview-col{ position:sticky; top:80px; align-self:flex-start; }
  .btn-primary{ transition:transform .15s ease, box-shadow .15s ease, opacity .15s ease; }
  .btn-primary:hover:not(:disabled){ transform:translateY(-1px); box-shadow:0 10px 24px -6px rgba(242,169,58,.4); }
  .btn-primary:active:not(:disabled){ transform:translateY(0); }
  .btn-secondary{ transition:background .15s ease, border-color .15s ease; }
  .btn-secondary:hover{ background:rgba(244,242,236,0.06); border-color:rgba(244,242,236,0.3); }
  .try-link{ color:var(--slate); text-decoration:none; border-bottom:1px solid rgba(242,169,58,0.45); padding-bottom:1px; transition:color .15s ease; }
  .try-link:hover{ color:var(--paper); }
  .field-input{ transition:border-color .15s ease, box-shadow .15s ease; }
  .field-input:focus{ outline:none; border-color:var(--amber) !important; box-shadow:0 0 0 3px rgba(242,169,58,0.18); }
  #paper{ transition:opacity .14s ease; }
  @media (prefers-reduced-motion: reduce){
    #paper{ transition:none; }
  }
  @media (max-width:860px){
    .editor-grid{ grid-template-columns:1fr; padding:16px; gap:20px; }
    .preview-col{ position:static; }
    #paper{ padding:32px 24px !important; }
  }
  @media (max-width:420px){
    .field-grid-2{ grid-template-columns:1fr !important; }
  }
  #paper, #paper * { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  @media print {
    body * { visibility:hidden; }
    #paper, #paper * { visibility:visible; }
    #paper{ position:absolute; top:0; left:0; width:100%; box-shadow:none !important; margin:0 !important; opacity:1 !important; }
    #no-print{ display:none !important; }
  }
</style>
</head>
<body>
<div id="root"><div id="load-fallback">Loading…</div></div>
<script>
  setTimeout(function(){
    if (typeof React === "undefined") {
      document.getElementById("root").innerHTML =
        '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;padding:24px;text-align:center;font-family:sans-serif;color:#A29B8C;background:#0C0D10;">' +
        '<div style="font-weight:700;color:#F4F2EC;">Couldn\'t load the app</div>' +
        '<div style="font-size:13px;max-width:320px;">A required script failed to load. Try switching from wifi to mobile data (or the reverse), or check if a VPN/ad blocker is active.</div>' +
        '</div>';
    }
  }, 6000);
</script>

<script>
const { useState, useEffect, useRef } = React;
const h = React.createElement;
const uid = () => Math.random().toString(36).slice(2, 9);

const emptyExp = () => ({ id: uid(), role: "", company: "", start: "", end: "", bullets: [""] });
const emptyEdu = () => ({ id: uid(), school: "", degree: "", start: "", end: "", bullets: [] });

const initialState = {
  name: "", title: "", email: "", phone: "", location: "", link: "",
  summary: "", experience: [emptyExp()], education: [emptyEdu()], skills: "",
  design: "classic",
};

const DESIGNS = ["classic", "modern", "sidebar", "minimal"];
const ATS_SAFE = ["classic", "minimal"];
const MAX_VERIFY_ATTEMPTS = 6;
const NOT_PAID_RETRIES = 4;
const VERIFY_RETRY_MS = 2000;
const VERIFY_TIMEOUT_MS = 9000;
const A4_RATIO = 1.4142;   // page height ≈ paper width × A4 aspect
const looksLikeStripeSession = (sid) => /^cs_(test|live)_[A-Za-z0-9]+$/.test(sid || "");

function Field({ label, ...props }) {
  return h("label", { style:{display:"block"} },
    h("span", { style:{display:"block",fontSize:11,fontWeight:600,letterSpacing:"0.03em",color:"#A29B8C",textTransform:"uppercase",marginBottom:4} }, label),
    h("input", Object.assign({ className:"field-input" }, props, { style:{width:"100%",borderRadius:6,border:"1px solid rgba(244,242,236,0.16)",background:"#22252B",padding:"8px 10px",fontSize:14,color:"#F4F2EC"} }))
  );
}

function TextArea({ label, ...props }) {
  return h("label", { style:{display:"block"} },
    h("span", { style:{display:"block",fontSize:11,fontWeight:600,letterSpacing:"0.03em",color:"#A29B8C",textTransform:"uppercase",marginBottom:4} }, label),
    h("textarea", Object.assign({ className:"field-input" }, props, { style:{width:"100%",borderRadius:6,border:"1px solid rgba(244,242,236,0.16)",background:"#22252B",padding:"8px 10px",fontSize:14,color:"#F4F2EC",resize:"none"} }))
  );
}

function SectionLabel({ n, children }) {
  return h("div", { style:{display:"flex",alignItems:"center",gap:8,margin:"28px 0 12px"} },
    h("span", { style:{fontSize:11,fontFamily:"'JetBrains Mono',monospace",color:"#F2A93A"} }, n),
    h("h2", { style:{fontSize:12,fontWeight:700,letterSpacing:"0.14em",textTransform:"uppercase",color:"#F4F2EC",margin:0} }, children),
    h("div", { style:{height:1,flex:1,background:"rgba(244,242,236,0.12)"} })
  );
}

function Paywall({ onStart, loading }) {
  return h("div", { style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16,padding:24,textAlign:"center"} },
    h("a", { href:"https://www.cv4me.io/", style:{fontWeight:800,fontSize:22,letterSpacing:"-0.02em",color:"#F4F2EC",textDecoration:"none",cursor:"pointer"} }, "CV", h("span", { style:{color:"#F2A93A"} }, "4"), "ME"),
    h("h1", { className:"paper-font", style:{fontSize:32,fontWeight:600,margin:0,color:"#F4F2EC"} }, "Start a new resume"),
    h("p", { style:{color:"#A29B8C",maxWidth:360,fontSize:14,margin:0} }, "Each resume is $1.99, paid once at the start. You'll get the live editor, all four designs, and unlimited edits and PDF exports for this resume."),
    h("button", { className:"btn-primary", onClick:onStart, disabled:loading, style:{marginTop:8,background:"#F2A93A",color:"#171207",border:"none",padding:"12px 22px",borderRadius:6,fontSize:14,fontWeight:700,cursor:loading?"default":"pointer",opacity:loading?0.6:1} },
      loading ? "Redirecting to checkout…" : "Start new resume — $1.99"
    ),
    h("a", { className:"try-link", href:"app.html?preview=1", style:{marginTop:2,fontSize:13} }, "Not sure? Try the live editor with sample data →")
  );
}

// ---- demo templates: one per landing-page gallery card, each with its own design ----
const demoTemplates = {
  designer: {
    design: "classic",
    name: "Jordan Ellis", title: "Product Designer", email: "jordan@email.com",
    phone: "(555) 019-2244", location: "Portland, OR", link: "jordanellis.design",
    summary: "Product designer with 6 years shaping consumer software, from early prototypes to shipped systems used by millions.",
    experience: [{ id: uid(), role: "Senior Product Designer", company: "Northbeam", start: "2022", end: "Present",
      bullets: ["Led redesign of onboarding flow, lifting activation 18%", "Built and maintained the company's design system"] }],
    education: [{ id: uid(), school: "Rhode Island School of Design", degree: "BFA, Graphic Design", start: "2015", end: "2019", bullets: [] }],
    skills: "Figma, Prototyping, Design Systems, User Research, HTML/CSS",
  },
  software: {
    design: "modern",
    name: "Maya Chen", title: "Senior Software Engineer", email: "maya.chen@email.com",
    phone: "(415) 555-0182", location: "San Francisco, CA", link: "github.com/mayachen",
    summary: "Backend-leaning engineer with 8 years building high-scale services, focused on performance, reliability, and clean system design.",
    experience: [{ id: uid(), role: "Staff Engineer", company: "Datastride", start: "2021", end: "Present",
      bullets: ["Cut core API latency 42% across 30+ services", "Led migration to an event-driven architecture"] }],
    education: [{ id: uid(), school: "UC Berkeley", degree: "BS, Computer Science", start: "2013", end: "2017", bullets: [] }],
    skills: "Go, Kubernetes, Postgres, gRPC, Distributed Systems",
  },
  healthcare: {
    design: "classic",
    name: "David Okafor", title: "Registered Nurse, BSN", email: "d.okafor@email.com",
    phone: "(312) 555-0143", location: "Chicago, IL", link: "",
    summary: "ICU nurse with 7 years of critical-care experience, known for steady judgement under pressure and mentoring new staff.",
    experience: [{ id: uid(), role: "ICU Nurse", company: "Mercy General", start: "2018", end: "Present",
      bullets: ["Managed care for 6+ critical patients per shift", "Precepted 12 new-graduate nurses to independence"] }],
    education: [{ id: uid(), school: "University of Illinois Chicago", degree: "BSN, Nursing", start: "2013", end: "2017", bullets: [] }],
    skills: "Critical Care, ACLS, Epic EHR, Triage, Patient Education",
  },
  marketing: {
    design: "sidebar",
    name: "Sofia Marino", title: "Growth Marketing Manager", email: "sofia.marino@email.com",
    phone: "(512) 555-0177", location: "Austin, TX", link: "sofiamarino.co",
    summary: "Full-funnel growth marketer who turns data into demand, with a track record scaling organic and paid channels profitably.",
    experience: [{ id: uid(), role: "Marketing Lead", company: "Lumen", start: "2020", end: "Present",
      bullets: ["Grew organic signups 3.4× in 12 months", "Owned a $1.2M annual paid-acquisition budget"] }],
    education: [{ id: uid(), school: "University of Texas at Austin", degree: "BBA, Marketing", start: "2012", end: "2016", bullets: [] }],
    skills: "SEO, Lifecycle, Analytics, Paid Social, Content Strategy",
  },
  graduate: {
    design: "minimal",
    name: "Aiden Walsh", title: "Computer Science Graduate", email: "aiden.walsh@email.com",
    phone: "07123 456789", location: "Leeds, UK", link: "github.com/aidenwalsh",
    summary: "Recent CS graduate who ships — comfortable across the stack and happiest turning an idea into a working, used product.",
    experience: [],
    education: [{ id: uid(), school: "University of Leeds", degree: "BSc Computer Science", start: "2021", end: "2025",
      bullets: ["Built a 2,000-user study-planning app as final project", "First place, NorthHack 2025 (48-hour hackathon)"] }],
    skills: "Python, React, SQL, Git, TypeScript",
  },
};

const getDemoData = (key) => {
  const tpl = demoTemplates[key] || demoTemplates.designer;
  return {
    name: tpl.name, title: tpl.title, email: tpl.email, phone: tpl.phone,
    location: tpl.location, link: tpl.link, summary: tpl.summary, skills: tpl.skills,
    design: tpl.design || "classic",
    experience: tpl.experience.map((e) => ({ ...e, id: uid(), bullets: [...e.bullets] })),
    education: tpl.education.map((e) => ({ ...e, id: uid(), bullets: [...(e.bullets || [])] })),
  };
};

function App() {
  const [data, setData] = useState(initialState);
  const [paid, setPaid] = useState(false);
  const [checking, setChecking] = useState(true);
  const [startingCheckout, setStartingCheckout] = useState(false);
  const [isDemo, setIsDemo] = useState(false);
  const [fading, setFading] = useState(false);
  const [saved, setSaved] = useState(false);
  const [pageCount, setPageCount] = useState(1);
  const verifyingRef = useRef(false);
  const savedTimer = useRef(null);
  const fadeTimer = useRef(null);
  const firstSave = useRef(true);

  const restoreSavedData = () => {
    try {
      const demoCarry = localStorage.getItem("cv4me_demo_data");
      if (demoCarry) {
        setData(JSON.parse(demoCarry));
        localStorage.removeItem("cv4me_demo_data");
        return;
      }
      const saved = localStorage.getItem("cv4me_data");
      if (saved) setData(JSON.parse(saved));
    } catch (e) {}
  };

  // Durable, session-agnostic entitlement so access is remembered on every future visit.
  const grantAccess = (sid) => {
    try {
      localStorage.setItem("cv4me_paid", "1");
      if (sid) localStorage.setItem("cv4me_paid_sid", sid);
    } catch (e) {}
    verifyingRef.current = false;
    restoreSavedData();
    setPaid(true);
    setChecking(false);
  };

  // Verify with the server. Trust an authoritative "not paid" (-> paywall).
  // Only fall back to granting when the server is genuinely unreachable, so a real
  // payer isn't locked out during an outage — while a crafted session id (which the
  // server will report as not paid) does NOT get in.
  const verifySession = (sid, attempt) => {
    attempt = attempt || 1;
    if (attempt === 1) {
      if (verifyingRef.current) return;
      verifyingRef.current = true;
    }
    setChecking(true);

    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), VERIFY_TIMEOUT_MS);
    const deny = () => { verifyingRef.current = false; setChecking(false); }; // -> paywall

    fetch(`/api/verify-session?session_id=${encodeURIComponent(sid)}`, { signal: controller.signal })
      .then((r) => r.json())
      .then((d) => {
        clearTimeout(timer);
        if (d && d.paid) { grantAccess(sid); return; }
        if (attempt < NOT_PAID_RETRIES) {
          setTimeout(() => verifySession(sid, attempt + 1), VERIFY_RETRY_MS);
        } else {
          deny();
        }
      })
      .catch(() => {
        clearTimeout(timer);
        if (attempt < MAX_VERIFY_ATTEMPTS) {
          setTimeout(() => verifySession(sid, attempt + 1), VERIFY_RETRY_MS);
        } else if (looksLikeStripeSession(sid)) {
          console.warn("cv4me: verify unreachable after retries; granting on Stripe redirect to protect payer.");
          grantAccess(sid);
        } else {
          deny();
        }
      });
  };

  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const sid = params.get("session_id");
    if (sid) {
      verifySession(sid, 1);
      return;
    }
    let entitled = false;
    try {
      entitled = localStorage.getItem("cv4me_paid") === "1" || !!localStorage.getItem("cv4me_paid_sid");
    } catch (e) {}
    if (entitled) {
      restoreSavedData();
      setPaid(true);
      setChecking(false);
    } else if (params.get("preview") === "1") {
      setData(getDemoData(params.get("template")));
      setIsDemo(true);
      setChecking(false);
    } else {
      setChecking(false);
    }
  }, []);

  // If the user leaves to fetch a verification code and returns, re-check payment.
  useEffect(() => {
    const onVisible = () => {
      if (document.visibilityState !== "visible" || paid) return;
      const sid = new URLSearchParams(window.location.search).get("session_id");
      if (sid) verifySession(sid, 1);
    };
    document.addEventListener("visibilitychange", onVisible);
    return () => document.removeEventListener("visibilitychange", onVisible);
  }, [paid]);

  // Autosave + "Saved ✓" chip (skips the initial restore so it only shows for real edits).
  useEffect(() => {
    if (!paid) return;
    try {
      localStorage.setItem("cv4me_data", JSON.stringify(data));
      if (firstSave.current) { firstSave.current = false; return; }
      setSaved(true);
      if (savedTimer.current) clearTimeout(savedTimer.current);
      savedTimer.current = setTimeout(() => setSaved(false), 1400);
    } catch (e) {}
  }, [data, paid]);

  // Live page-length estimate: paper height vs A4 aspect at current width.
  useEffect(() => {
    const id = requestAnimationFrame(() => {
      const el = document.getElementById("paper");
      if (!el || el.clientWidth < 10) return;
      const pageH = el.clientWidth * A4_RATIO;
      const pages = Math.max(1, Math.ceil(el.scrollHeight / pageH - 0.04));
      setPageCount(pages);
    });
    return () => cancelAnimationFrame(id);
  }, [data, paid, isDemo]);

  // Timer hygiene on unmount.
  useEffect(() => () => {
    if (savedTimer.current) clearTimeout(savedTimer.current);
    if (fadeTimer.current) clearTimeout(fadeTimer.current);
  }, []);

  const startCheckout = async () => {
    setStartingCheckout(true);
    try {
      const res = await fetch("/api/create-checkout-session", { method: "POST" });
      const d = await res.json();
      if (d.url) { window.location.href = d.url; return; }
    } catch (e) {}
    setStartingCheckout(false);
  };

  const unlockFromDemo = async () => {
    try { localStorage.setItem("cv4me_demo_data", JSON.stringify(data)); } catch (e) {}
    startCheckout();
  };

  const set = (k, v) => setData((d) => ({ ...d, [k]: v }));

  // Crossfade when switching designs (~250ms total).
  const switchDesign = (dn) => {
    if (dn === data.design) return;
    if (fadeTimer.current) clearTimeout(fadeTimer.current);
    setFading(true);
    fadeTimer.current = setTimeout(() => {
      set("design", dn);
      fadeTimer.current = setTimeout(() => setFading(false), 50);
    }, 140);
  };

  const updateExp = (id, patch) => setData((d) => ({ ...d, experience: d.experience.map((e) => (e.id === id ? { ...e, ...patch } : e)) }));
  const updateBullet = (expId, i, val) => setData((d) => ({ ...d, experience: d.experience.map((e) => e.id === expId ? { ...e, bullets: e.bullets.map((b, bi) => (bi === i ? val : b)) } : e) }));
  const addBullet = (expId) => setData((d) => ({ ...d, experience: d.experience.map((e) => e.id === expId ? { ...e, bullets: [...e.bullets, ""] } : e) }));
  const removeBullet = (expId, i) => setData((d) => ({ ...d, experience: d.experience.map((e) => e.id === expId ? { ...e, bullets: e.bullets.filter((_, bi) => bi !== i) } : e) }));
  const addExp = () => setData((d) => ({ ...d, experience: [...d.experience, emptyExp()] }));
  const removeExp = (id) => setData((d) => ({ ...d, experience: d.experience.filter((e) => e.id !== id) }));
  const updateEdu = (id, patch) => setData((d) => ({ ...d, education: d.education.map((e) => (e.id === id ? { ...e, ...patch } : e)) }));
  const updateEduBullet = (eduId, i, val) => setData((d) => ({ ...d, education: d.education.map((e) => e.id === eduId ? { ...e, bullets: (e.bullets || []).map((b, bi) => (bi === i ? val : b)) } : e) }));
  const addEduBullet = (eduId) => setData((d) => ({ ...d, education: d.education.map((e) => e.id === eduId ? { ...e, bullets: [...(e.bullets || []), ""] } : e) }));
  const removeEduBullet = (eduId, i) => setData((d) => ({ ...d, education: d.education.map((e) => e.id === eduId ? { ...e, bullets: (e.bullets || []).filter((_, bi) => bi !== i) } : e) }));
  const addEdu = () => setData((d) => ({ ...d, education: [...d.education, emptyEdu()] }));
  const removeEdu = (id) => setData((d) => ({ ...d, education: d.education.filter((e) => e.id !== id) }));
  const handlePrint = () => window.print();
  const skillList = data.skills.split(",").map((s) => s.trim()).filter(Boolean);

  const startNewResume = () => {
    if (!window.confirm("Start a new resume? Your current one will be cleared, and a new resume is another $1.99.")) return;
    try {
      localStorage.removeItem("cv4me_paid");
      localStorage.removeItem("cv4me_paid_sid");
      localStorage.removeItem("cv4me_data");
    } catch (e) {}
    window.history.replaceState({}, "", window.location.pathname);
    setData(initialState);
    setPaid(false);
  };

  // ---------- shared resume-render helpers ----------
  const bulletNode = (b, i) => h("li", { key:i, style:{fontSize:12.5,color:"#44403c",paddingLeft:14,position:"relative",marginBottom:2} },
    h("span", { style:{position:"absolute",left:0,color:"#B87F1E"} }, "—"), b);
  const expNode = (exp) => h("div", { key:exp.id, style:{marginBottom:14} },
    h("div", { style:{display:"flex",justifyContent:"space-between",alignItems:"baseline"} },
      h("div", { style:{fontSize:14,fontWeight:700,color:"#191A1D"} }, exp.role, " ", exp.company ? h("span", { style:{fontWeight:400,color:"#57534e"} }, "— ", exp.company) : null),
      h("div", { className:"ui-font", style:{fontSize:10.5,color:"#a8a29e",marginLeft:8,whiteSpace:"nowrap"} }, exp.start, exp.end ? ` – ${exp.end}` : "")
    ),
    h("ul", { style:{marginTop:4,paddingLeft:0,listStyle:"none"} }, exp.bullets.filter(Boolean).map(bulletNode))
  );
  const eduNode = (edu) => h("div", { key:edu.id, style:{marginBottom:8} },
    h("div", { style:{display:"flex",justifyContent:"space-between",alignItems:"baseline"} },
      h("div", { style:{fontSize:13,color:"#191A1D"} }, edu.school, edu.degree ? h("span", { style:{color:"#78716c"} }, " — ", edu.degree) : null),
      h("div", { className:"ui-font", style:{fontSize:10.5,color:"#a8a29e",whiteSpace:"nowrap"} }, edu.start, edu.end ? ` – ${edu.end}` : "")
    ),
    (edu.bullets && edu.bullets.filter(Boolean).length>0) ? h("ul", { style:{marginTop:4,paddingLeft:0,listStyle:"none"} }, edu.bullets.filter(Boolean).map(bulletNode)) : null
  );
  const barLabel = (txt) => h("div", { className:"ui-font", style:{fontSize:10,fontWeight:700,letterSpacing:"0.14em",textTransform:"uppercase",color:"#a8a29e",borderBottom:"1px solid #e7e5e0",paddingBottom:4,marginBottom:10} }, txt);
  const modernLabel = (txt) => h("div", { className:"ui-font", style:{display:"flex",alignItems:"center",gap:8,marginBottom:10} },
    h("span", { style:{width:13,height:13,background:"#F2A93A",borderRadius:3,display:"inline-block"} }),
    h("span", { style:{fontSize:11,fontWeight:800,letterSpacing:"0.12em",textTransform:"uppercase",color:"#191A1D"} }, txt));
  const minLabel = (txt) => h("div", { className:"ui-font", style:{fontSize:10,fontWeight:700,letterSpacing:"0.2em",textTransform:"uppercase",color:"#a8a29e",marginBottom:10,textAlign:"center"} }, txt);

  // ---------- four designs ----------
  const renderClassic = (contacts, exps, edus, skills) => [
    h("div", { key:"h", style:{display:"flex",justifyContent:"space-between",alignItems:"baseline",borderBottom:"2px solid #1c1917",paddingBottom:12,marginBottom:16} },
      h("div", null,
        h("div", { style:{fontSize:28,fontWeight:600,letterSpacing:"-0.01em",lineHeight:1,color:"#191A1D"} }, data.name || "Your Name"),
        h("div", { style:{fontSize:14,color:"#B87F1E",marginTop:4,fontWeight:600} }, data.title)
      )
    ),
    h("div", { key:"c", className:"ui-font", style:{fontSize:11,color:"#78716c",display:"flex",flexWrap:"wrap",gap:"2px 12px",marginBottom:20} }, contacts.map((v,i)=>h("span",{key:i},v))),
    data.summary ? h("p", { key:"s", style:{fontSize:13,lineHeight:1.6,color:"#44403c",marginBottom:20} }, data.summary) : null,
    exps.length ? h("div", { key:"e", style:{marginBottom:20} }, barLabel("Experience"), exps.map(expNode)) : null,
    edus.length ? h("div", { key:"d", style:{marginBottom:20} }, barLabel("Education"), edus.map(eduNode)) : null,
    skills.length ? h("div", { key:"k" }, barLabel("Skills"),
      h("div", { style:{display:"flex",flexWrap:"wrap",gap:6} }, skills.map((s,i)=>h("span",{key:i,className:"ui-font",style:{fontSize:11,background:"#f5f4f1",color:"#44403c",borderRadius:4,padding:"3px 8px"}},s)))
    ) : null,
  ];

  const renderModern = (contacts, exps, edus, skills) => [
    h("div", { key:"bar", style:{height:6,background:"#F2A93A",borderRadius:3,marginBottom:20} }),
    h("div", { key:"h", style:{marginBottom:12} },
      h("div", { style:{fontSize:32,fontWeight:700,letterSpacing:"-0.02em",lineHeight:1,color:"#191A1D"} }, data.name || "Your Name"),
      h("div", { style:{fontSize:14,color:"#B87F1E",marginTop:6,fontWeight:700,letterSpacing:"0.02em"} }, data.title)
    ),
    h("div", { key:"c", className:"ui-font", style:{fontSize:11,color:"#78716c",display:"flex",flexWrap:"wrap",gap:"2px 14px",marginBottom:18,borderTop:"1px solid #ececec",paddingTop:12} }, contacts.map((v,i)=>h("span",{key:i},v))),
    data.summary ? h("p", { key:"s", style:{fontSize:13,lineHeight:1.65,color:"#44403c",marginBottom:22} }, data.summary) : null,
    exps.length ? h("div", { key:"e", style:{marginBottom:22} }, modernLabel("Experience"), exps.map(expNode)) : null,
    edus.length ? h("div", { key:"d", style:{marginBottom:22} }, modernLabel("Education"), edus.map(eduNode)) : null,
    skills.length ? h("div", { key:"k" }, modernLabel("Skills"),
      h("div", { style:{display:"flex",flexWrap:"wrap",gap:6} }, skills.map((s,i)=>h("span",{key:i,className:"ui-font",style:{fontSize:11,color:"#7a5a12",border:"1px solid #E7C98A",background:"#fdf6e8",borderRadius:20,padding:"3px 10px"}},s)))
    ) : null,
  ];

  const renderSidebar = (contacts, exps, edus, skills) => [
    h("div", { key:"row", style:{display:"flex",minHeight:880,alignItems:"stretch"} },
      h("div", { style:{width:"34%",background:"#1B1E24",color:"#EDEBE4",padding:"36px 24px"} },
        h("div", { style:{fontSize:22,fontWeight:700,lineHeight:1.15,color:"#F4F2EC"} }, data.name || "Your Name"),
        h("div", { style:{fontSize:12.5,color:"#F2A93A",marginTop:6,fontWeight:600} }, data.title),
        contacts.length ? h("div", { style:{marginTop:24} },
          h("div", { className:"ui-font", style:{fontSize:9.5,letterSpacing:"0.14em",textTransform:"uppercase",color:"#8A94A3",marginBottom:8} }, "Contact"),
          contacts.map((v,i)=>h("div",{key:i,className:"ui-font",style:{fontSize:10.5,color:"#C9C6BC",marginBottom:5,wordBreak:"break-word"}},v))
        ) : null,
        skills.length ? h("div", { style:{marginTop:24} },
          h("div", { className:"ui-font", style:{fontSize:9.5,letterSpacing:"0.14em",textTransform:"uppercase",color:"#8A94A3",marginBottom:8} }, "Skills"),
          h("div", { style:{display:"flex",flexWrap:"wrap",gap:5} }, skills.map((s,i)=>h("span",{key:i,className:"ui-font",style:{fontSize:10,color:"#EDEBE4",background:"rgba(244,242,236,0.10)",borderRadius:4,padding:"3px 7px"}},s)))
        ) : null
      ),
      h("div", { style:{flex:1,padding:"40px 38px"} },
        data.summary ? h("p", { style:{fontSize:13,lineHeight:1.6,color:"#44403c",marginBottom:20} }, data.summary) : null,
        exps.length ? h("div", { style:{marginBottom:20} }, barLabel("Experience"), exps.map(expNode)) : null,
        edus.length ? h("div", { style:{marginBottom:20} }, barLabel("Education"), edus.map(eduNode)) : null
      )
    ),
  ];

  const renderMinimal = (contacts, exps, edus, skills) => [
    h("div", { key:"h", style:{textAlign:"center",marginBottom:8} },
      h("div", { style:{fontSize:30,fontWeight:600,letterSpacing:"0.06em",color:"#191A1D"} }, data.name || "Your Name"),
      data.title ? h("div", { style:{fontSize:12.5,color:"#78716c",marginTop:8,letterSpacing:"0.14em",textTransform:"uppercase"} }, data.title) : null
    ),
    h("div", { key:"c", className:"ui-font", style:{fontSize:11,color:"#78716c",display:"flex",justifyContent:"center",flexWrap:"wrap",gap:"2px 14px",marginBottom:18} }, contacts.map((v,i)=>h("span",{key:i},v))),
    h("div", { key:"rule", style:{height:1,background:"#e7e5e0",margin:"0 auto 24px",maxWidth:110} }),
    data.summary ? h("p", { key:"s", style:{fontSize:13,lineHeight:1.7,color:"#44403c",marginBottom:24,textAlign:"center",maxWidth:520,marginLeft:"auto",marginRight:"auto"} }, data.summary) : null,
    exps.length ? h("div", { key:"e", style:{marginBottom:22} }, minLabel("Experience"), exps.map(expNode)) : null,
    edus.length ? h("div", { key:"d", style:{marginBottom:22} }, minLabel("Education"), edus.map(eduNode)) : null,
    skills.length ? h("div", { key:"k" }, minLabel("Skills"),
      h("div", { style:{display:"flex",flexWrap:"wrap",gap:6,justifyContent:"center"} }, skills.map((s,i)=>h("span",{key:i,className:"ui-font",style:{fontSize:11,color:"#57534e",borderBottom:"1px solid #d6d3cc",padding:"1px 4px"}},s)))
    ) : null,
  ];

  const renderPaper = () => {
    const contacts = [data.email,data.phone,data.location,data.link].filter(Boolean);
    const exps = data.experience.filter((e)=>e.role||e.company);
    const edus = data.education.filter((e)=>e.school);
    if (data.design === "modern")  return renderModern(contacts, exps, edus, skillList);
    if (data.design === "sidebar") return renderSidebar(contacts, exps, edus, skillList);
    if (data.design === "minimal") return renderMinimal(contacts, exps, edus, skillList);
    return renderClassic(contacts, exps, edus, skillList);
  };

  if (checking) {
    return h("div", { style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:10,padding:24,textAlign:"center"} },
      h("div", { style:{color:"#F4F2EC",fontSize:15,fontWeight:700} }, "Confirming your payment…"),
      h("p", { style:{color:"#A29B8C",fontSize:13,maxWidth:320,margin:0,lineHeight:1.6} }, "This can take a few seconds. Please don't refresh or pay again — if you left to grab a verification code, we'll pick it back up automatically.")
    );
  }
  if (!paid && !isDemo) {
    return h(Paywall, { onStart: startCheckout, loading: startingCheckout });
  }

  const paperPad = data.design === "sidebar" ? 0 : "56px 52px";

  return h("div", null,
    h("div", { id:"no-print", style:{borderBottom:"1px solid rgba(244,242,236,0.12)",background:"rgba(12,13,16,0.85)",position:"sticky",top:0,zIndex:10} },
      h("div", { style:{maxWidth:1120,margin:"0 auto",padding:"12px 24px",display:"flex",justifyContent:"space-between",alignItems:"center"} },
        h("a", { href:"https://www.cv4me.io/", style:{fontWeight:800,fontSize:16,letterSpacing:"-0.02em",color:"#F4F2EC",textDecoration:"none"} }, "CV", h("span", { style:{color:"#F2A93A"} }, "4"), "ME"),
        h("div", { style:{display:"flex",alignItems:"center",gap:12} },
          !isDemo ? h("span", { className:"ui-font", style:{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"#A29B8C",opacity:saved?1:0,transition:"opacity .35s ease",whiteSpace:"nowrap"} },
            h("span", { style:{color:"#F2A93A"} }, "✓ "), "Saved") : null,
          isDemo
            ? h("button", { className:"btn-primary", onClick:unlockFromDemo, disabled:startingCheckout, style:{background:"#F2A93A",color:"#171207",border:"none",padding:"9px 18px",borderRadius:6,fontSize:13,fontWeight:700,cursor:startingCheckout?"default":"pointer",opacity:startingCheckout?0.6:1} }, startingCheckout ? "Redirecting…" : "Unlock full export — $1.99")
            : h("button", { className:"btn-primary", onClick:handlePrint, style:{background:"#F2A93A",color:"#171207",border:"none",padding:"9px 16px",borderRadius:6,fontSize:13,fontWeight:700,cursor:"pointer"} }, "Print / Save as PDF"),
          !isDemo ? h("button", { className:"btn-secondary", onClick:startNewResume, style:{background:"transparent",color:"#A29B8C",border:"1px solid rgba(244,242,236,0.18)",padding:"8px 14px",borderRadius:6,fontSize:13,fontWeight:600,cursor:"pointer"} }, "New resume") : null
        )
      )
    ),
    h("div", { id:"no-print", style:{borderBottom:"1px solid rgba(244,242,236,0.12)",background:"rgba(12,13,16,0.55)"} },
      h("div", { style:{maxWidth:1120,margin:"0 auto",padding:"10px 24px"} },
        h("div", { style:{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"} },
          h("span", { className:"ui-font", style:{fontSize:11,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:"#A29B8C",marginRight:2} }, "Design"),
          DESIGNS.map((dn) => h("button", { key:dn, onClick:()=>switchDesign(dn), className:"btn-secondary",
            style:{display:"inline-flex",alignItems:"center",gap:6,fontSize:12.5,fontWeight:700,padding:"6px 14px",borderRadius:20,cursor:"pointer",
              border: data.design===dn ? "1px solid #F2A93A" : "1px solid rgba(244,242,236,0.18)",
              background: data.design===dn ? "rgba(242,169,58,0.14)" : "transparent",
              color: data.design===dn ? "#F2A93A" : "#A29B8C"} },
            h("span", { style:{textTransform:"capitalize"} }, dn),
            ATS_SAFE.includes(dn) ? h("span", { style:{fontSize:8.5,fontWeight:800,letterSpacing:"0.06em",textTransform:"uppercase",color:"#93B84A"} }, "ATS") : null
          ))
        ),
        h("div", { className:"ui-font", style:{fontSize:11,color:"#8A94A3",marginTop:8,lineHeight:1.5} }, "Classic & Minimal are single-column — the safest bet for applicant tracking systems (ATS). Sidebar & Modern are built to stand out to a human reader.")
      )
    ),
    isDemo ? h("div", { id:"no-print", style:{background:"rgba(242,169,58,0.08)",borderBottom:"1px solid rgba(242,169,58,0.2)",padding:"10px 24px",textAlign:"center"} },
      h("span", { className:"ui-font", style:{fontSize:12.5,color:"#F2A93A"} }, "You're previewing with sample data — edit freely and switch designs above. Unlock to export your own resume as a PDF.")
    ) : null,
    h("div", { className:"editor-grid" },
      h("div", { id:"no-print" },
        h(SectionLabel, { n:"01" }, "Identity"),
        h("div", { className:"field-grid-2", style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10} },
          h(Field, { label:"Full name", value:data.name, onChange:(e)=>set("name",e.target.value) }),
          h(Field, { label:"Title", value:data.title, onChange:(e)=>set("title",e.target.value) }),
          h(Field, { label:"Email", value:data.email, onChange:(e)=>set("email",e.target.value) }),
          h(Field, { label:"Phone", value:data.phone, onChange:(e)=>set("phone",e.target.value) }),
          h(Field, { label:"Location", value:data.location, onChange:(e)=>set("location",e.target.value) }),
          h(Field, { label:"Link", value:data.link, onChange:(e)=>set("link",e.target.value) })
        ),
        h(SectionLabel, { n:"02" }, "Summary"),
        h(TextArea, { rows:3, value:data.summary, onChange:(e)=>set("summary",e.target.value), label:"Two or three sentences" }),
        h(SectionLabel, { n:"03" }, "Experience"),
        data.experience.map((exp) =>
          h("div", { key:exp.id, style:{border:"1px solid rgba(244,242,236,0.12)",borderRadius:8,background:"#1B1E24",padding:14,marginBottom:14} },
            h("div", { style:{display:"flex",gap:8} },
              h("div", { className:"field-grid-2", style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,flex:1} },
                h(Field, { label:"Role", value:exp.role, onChange:(e)=>updateExp(exp.id,{role:e.target.value}) }),
                h(Field, { label:"Company", value:exp.company, onChange:(e)=>updateExp(exp.id,{company:e.target.value}) }),
                h(Field, { label:"Start", value:exp.start, onChange:(e)=>updateExp(exp.id,{start:e.target.value}) }),
                h(Field, { label:"End", value:exp.end, onChange:(e)=>updateExp(exp.id,{end:e.target.value}) })
              ),
              h("button", { onClick:()=>removeExp(exp.id), style:{background:"none",border:"none",color:"#A29B8C",cursor:"pointer",alignSelf:"flex-start",marginTop:20} }, "✕")
            ),
            h("div", { style:{marginTop:10,display:"flex",flexDirection:"column",gap:6} },
              exp.bullets.map((b,i) =>
                h("div", { key:i, style:{display:"flex",gap:6,alignItems:"center"} },
                  h("input", { className:"field-input", value:b, placeholder:"What did you do, and what changed?", onChange:(e)=>updateBullet(exp.id,i,e.target.value), style:{flex:1,border:"1px solid rgba(244,242,236,0.12)",background:"#22252B",color:"#F4F2EC",borderRadius:6,padding:"6px 8px",fontSize:13} }),
                  h("button", { onClick:()=>removeBullet(exp.id,i), style:{background:"none",border:"none",color:"#5C574D",cursor:"pointer"} }, "✕")
                )
              ),
              h("button", { onClick:()=>addBullet(exp.id), style:{background:"none",border:"none",color:"#F2A93A",fontSize:12,fontWeight:700,cursor:"pointer",textAlign:"left",padding:0} }, "+ Add line")
            )
          )
        ),
        h("button", { onClick:addExp, style:{background:"none",border:"none",color:"#F4F2EC",fontSize:13,fontWeight:700,cursor:"pointer",padding:0} }, "+ Add position"),
        h(SectionLabel, { n:"04" }, "Education"),
        data.education.map((edu) =>
          h("div", { key:edu.id, style:{border:"1px solid rgba(244,242,236,0.12)",borderRadius:8,background:"#1B1E24",padding:14,marginBottom:10} },
            h("div", { style:{display:"flex",gap:8} },
              h("div", { className:"field-grid-2", style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,flex:1} },
                h(Field, { label:"School", value:edu.school, onChange:(e)=>updateEdu(edu.id,{school:e.target.value}) }),
                h(Field, { label:"Degree", value:edu.degree, onChange:(e)=>updateEdu(edu.id,{degree:e.target.value}) }),
                h(Field, { label:"Start", value:edu.start, onChange:(e)=>updateEdu(edu.id,{start:e.target.value}) }),
                h(Field, { label:"End", value:edu.end, onChange:(e)=>updateEdu(edu.id,{end:e.target.value}) })
              ),
              h("button", { onClick:()=>removeEdu(edu.id), style:{background:"none",border:"none",color:"#A29B8C",cursor:"pointer",alignSelf:"flex-start",marginTop:20} }, "✕")
            ),
            h("div", { style:{marginTop:10,display:"flex",flexDirection:"column",gap:6} },
              (edu.bullets || []).map((b,i) =>
                h("div", { key:i, style:{display:"flex",gap:6,alignItems:"center"} },
                  h("input", { className:"field-input", value:b, placeholder:"Achievement, project, honour, or coursework", onChange:(e)=>updateEduBullet(edu.id,i,e.target.value), style:{flex:1,border:"1px solid rgba(244,242,236,0.12)",background:"#22252B",color:"#F4F2EC",borderRadius:6,padding:"6px 8px",fontSize:13} }),
                  h("button", { onClick:()=>removeEduBullet(edu.id,i), style:{background:"none",border:"none",color:"#5C574D",cursor:"pointer"} }, "✕")
                )
              ),
              h("button", { onClick:()=>addEduBullet(edu.id), style:{background:"none",border:"none",color:"#F2A93A",fontSize:12,fontWeight:700,cursor:"pointer",textAlign:"left",padding:0} }, "+ Add line")
            )
          )
        ),
        h("button", { onClick:addEdu, style:{background:"none",border:"none",color:"#F4F2EC",fontSize:13,fontWeight:700,cursor:"pointer",padding:0} }, "+ Add school"),
        h(SectionLabel, { n:"05" }, "Skills"),
        h(TextArea, { rows:2, value:data.skills, onChange:(e)=>set("skills",e.target.value), label:"Comma separated" }),
        h("div", { style:{height:24} })
      ),
      h("div", { className:"preview-col" },
        h("div", { id:"no-print", className:"ui-font", style:{display:"flex",justifyContent:"center",marginBottom:10} },
          h("span", { style:{fontFamily:"'JetBrains Mono',monospace",fontSize:11,letterSpacing:"0.04em",padding:"5px 13px",borderRadius:20,border:"1px solid rgba(244,242,236,0.14)",background:"rgba(27,30,36,0.85)",color: pageCount===1 ? "#F2A93A" : "#A29B8C",transition:"color .3s ease"} },
            pageCount===1 ? "~1 page ✓" : ("~" + pageCount + " pages — consider trimming"))
        ),
        h("div", { id:"paper", className:"paper-font", style:{background:"#fff",boxShadow:"0 24px 60px -16px rgba(0,0,0,0.6)",maxWidth:680,minHeight:880,padding:paperPad,margin:"0 auto",position:"relative",opacity: fading ? 0 : 1} },
          isDemo ? h("div", { className:"ui-font", style:{position:"absolute",top:16,right:16,zIndex:2,background:"#F2A93A",color:"#171207",fontSize:10,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",padding:"4px 10px",borderRadius:20} }, "Preview") : null,
          renderPaper()
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
